services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-prod
    ports:
      - "${QDRANT_PORT_MAIN}:6333"
      - "${QDRANT_PORT_GRPC}:6334"
    volumes:
      - .data/qdrant:/qdrant/storage
    restart: unless-stopped
    networks:
      - vdb_network

  extraction-service:
    image: auslei/investor_iq_extraction:latest
    container_name: extraction-service-prod
    ports:
      - "${EXTRACTION_PORT}:8001"
    env_file:
      - .env
    environment:
      - EXTRACTION_PORT=${EXTRACTION_PORT}
      - PYTHONPATH=/app
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - HF_HOME=/root/.cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/root/.cache/huggingface/hub
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .media_cache:/app/.media_cache
      - .whisper_cache:/app/.whisper_cache
      - .huggingface_cache:/root/.cache/huggingface
      - ./${CONFIG_PATH}:/app/config.yaml
      - ./${PROJECTS_PATH}:/app/projects
    restart: unless-stopped
    networks:
      - vdb_network

  vectordb-service:
    image: auslei/investor_iq_vectordb:latest
    container_name: vectordb-service-prod
    ports:
      - "${VECTORDB_PORT}:8002"
    env_file:
      - .env
    environment:
      - VECTORDB_PORT=${VECTORDB_PORT}
      - PYTHONPATH=/app
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - HF_HOME=/root/.cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/root/.cache/huggingface/hub
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qdrant
    volumes:
      - .data/vectordb:/app/data/vectordb
      - .huggingface_cache:/root/.cache/huggingface
      - ./${CONFIG_PATH}:/app/config.yaml
      - ./${PROJECTS_PATH}:/app/projects
    restart: unless-stopped
    networks:
      - vdb_network

  core_app:
    image: auslei/investor_iq_core_app:latest
    container_name: investor_iq_core_app-prod
    ports:
      - "${CORE_APP_API_PORT}:8180"  # Webservice API
      - "${CORE_APP_UI_PORT}:8190"  # UI Server
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - EXTRACTION_SERVICE_URL=${EXTRACTION_SERVICE_URL}
      - VECTORDB_SERVICE_URL=${VECTORDB_SERVICE_URL}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - PROJECTS_BASE_DIR=/app/projects
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - extraction-service
      - vectordb-service
    volumes:
      - ./${CONFIG_PATH}:/app/config.yaml
      - ./${PROJECTS_PATH}:/app/projects
      - ./investment_data:/app/investment_data
    restart: unless-stopped
    networks:
      - vdb_network

networks:
  vdb_network:
    driver: bridge
